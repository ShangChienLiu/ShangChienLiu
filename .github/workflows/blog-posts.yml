name: Update blog posts in README

on:
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC
  workflow_dispatch:
  push:
    paths:
      - ".github/scripts/update_blog_posts.py"
      - ".github/workflows/blog-posts.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape latest posts and update README
        run: python .github/scripts/update_blog_posts.py

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto-update latest blog posts"
          git push
